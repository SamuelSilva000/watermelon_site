<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WaterMelon - Calcados Minimalistas</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Space Grotesk',sans-serif}
body{background:#fafafa;color:#1a1a1a;min-height:100vh;display:flex;flex-direction:column;line-height:1.5}
header{background:linear-gradient(135deg,#ec0772,#ed1c24);padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.75rem}
header img{height:28px;filter:brightness(0) invert(1)}
nav{display:flex;gap:1.5rem;flex-wrap:wrap}
nav a{color:#fff;text-decoration:none;font-weight:500;font-size:0.8rem;letter-spacing:0.3px;opacity:0.9}
nav a:hover{opacity:1}
.hero{padding:1.75rem 1rem;text-align:center;background:linear-gradient(180deg,#fff 0%,#f5f5f5 100%);border-bottom:1px solid #eee}
.hero h1{font-size:clamp(1.6rem,5vw,2.8rem);font-weight:700;letter-spacing:-1px;background:linear-gradient(135deg,#ec0772,#ed1c24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:0.2rem}
.hero p{color:#666;max-width:360px;margin:0 auto 0.9rem;font-size:0.9rem;font-weight:300}
.btn{display:inline-block;padding:0.65rem 1.5rem;background:linear-gradient(135deg,#ec0772,#ed1c24);color:#fff;text-decoration:none;font-weight:600;font-size:0.75rem;letter-spacing:0.5px;border-radius:2px;transition:transform 0.2s,box-shadow 0.2s}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(236,7,114,0.25)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:0;background:#fff}
.card{padding:1.5rem;text-align:center;border:1px solid #eee;transition:border-color 0.2s}
.card:hover{border-color:#ec0772}
.card img{width:100%;height:160px;object-fit:cover;margin-bottom:0.75rem;filter:grayscale(20%)}
.card:hover img{filter:grayscale(0%)}
.card h3{font-size:0.95rem;font-weight:500;margin-bottom:0.2rem}
.card .preco{font-weight:700;color:#ed1c24;font-size:1rem}
.newsletter{background:linear-gradient(135deg,#ec0772,#ed1c24);color:#fff;padding:2rem 1.5rem;text-align:center}
.newsletter h2{font-size:1.25rem;font-weight:300;margin-bottom:0.3rem}
.newsletter p{opacity:0.9;margin-bottom:1rem;font-size:0.9rem}
.newsletter form{display:flex;justify-content:center;flex-wrap:wrap;gap:0.5rem;max-width:440px;margin:0 auto}
.newsletter input{padding:0.85rem;border:none;flex:1;min-width:180px;font-size:0.9rem;outline:none}
.newsletter button{padding:0.85rem 1.5rem;background:#1a1a1a;color:#fff;border:none;cursor:pointer;font-weight:600;font-size:0.8rem}
footer{background:#1a1a1a;color:#fff;padding:1.5rem;text-align:center}
footer p{opacity:0.6;font-size:0.75rem}
@media(max-width:768px){
header{padding:0.85rem 1rem;justify-content:center;gap:0.5rem}
header img{height:24px}
nav{gap:1rem}
nav a{font-size:0.75rem}
.hero{padding:1.4rem 1rem}
.hero p{font-size:0.85rem;margin-bottom:0.8rem}
.btn{padding:0.6rem 1.25rem;font-size:0.7rem}
}
@media(max-width:480px){
header{flex-direction:column;gap:0.75rem}
nav{width:100%;justify-content:center;gap:0.75rem}
nav a{font-size:0.7rem}
.hero{padding:1.1rem 0.85rem}
.hero h1{font-size:1.4rem}
.hero p{font-size:0.8rem;max-width:250px;margin-bottom:0.7rem}
.grid{grid-template-columns:1fr 1fr}
.card{padding:1rem}
.card img{height:120px;margin-bottom:0.5rem}
.card h3{font-size:0.85rem}
.card .preco{font-size:0.9rem}
.newsletter{padding:1.5rem 1rem}
.newsletter h2{font-size:1.1rem}
.newsletter p{font-size:0.8rem}
.newsletter form{flex-direction:column;align-items:stretch;gap:0.5rem}
.newsletter input,.newsletter button{width:100%;min-width:auto;padding:0.8rem}
}
</style>
</head>
<body>
<header><a href="#"><img src="https://segaretro.org/images/c/cb/Watermelon_logo.svg" alt="WaterMelon"></a><nav><a href="#">Inicio</a><a href="#">Produtos</a><a href="#">Contato</a><a href="#">Login</a></nav></header>
<main class="hero"><h1>WaterMelon</h1><p>Calcados minimalistas para quem caminha com personalidade.</p><a href="#" class="btn">VER COLECAO</a></main>
<section class="grid">
<div class="card"><img src="https://placehold.co/400x400/f5f5f5/ec0772?text=Air+Flow" alt="Tenis"><h3>Air Flow</h3><p class="preco">R$ 299</p></div>
<div class="card"><img src="https://placehold.co/400x400/f5f5f5/ed1c24?text=Urban+Boot" alt="Boot"><h3>Urban Boot</h3><p class="preco">R$ 450</p></div>
<div class="card"><img src="https://placehold.co/400x400/f5f5f5/ec0772?text=Runner+X" alt="Runner"><h3>Runner X</h3><p class="preco">R$ 180</p></div>
<div class="card"><img src="https://placehold.co/400x400/f5f5f5/ed1c24?text=Lite+Walk" alt="Sandal"><h3>Lite Walk</h3><p class="preco">R$ 120</p></div>
</section>
<section class="newsletter"><h2>Newsletter</h2><p>Receba lancamentos e ofertas exclusivas</p><form><input type="email" placeholder="seu@email.com" required><button type="submit">ASSINAR</button></form></section>
<footer><p>2025 WaterMelon. Todos os direitos reservados.</p></footer>
</body>
</html>
